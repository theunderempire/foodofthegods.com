version: "3.8"
services:
  mongodb:
    image: mongo
    container_name: foodofthegods-db
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./mongodb/database:/data/db
    ports:
      - 27017:27017
    restart: unless-stopped
  db-seed:
    build: ./mongodb/seed
    links:
      - mongodb
networks:
  default:
    external:
      name: fotg-network