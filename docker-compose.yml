version: "3.8"
services:
  fotg-api:
    build: ./api
    container_name: foodofthegods-api
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      fotg-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - START_CMD=start-dev
    ports:
      - 3000:3000
    restart: unless-stopped
    networks:
      - fotg-network

  fotg-db:
    image: mongo:8
    container_name: foodofthegods-db
    environment:
      - PUID=1000
      - PGID=1000
      - MONGO_INITDB_ROOT_USERNAME=${DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
      - MONGO_INITDB_DATABASE=${DB_NAME}
    volumes:
      - mongodata:/data/db
    # No ports exposed - only accessible within Docker network
    networks:
      - fotg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  db-seed:
    build: ./db/mongodb/seed
    profiles:
      - seed
    networks:
      - fotg-network
    depends_on:
      fotg-db:
        condition: service_healthy
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

networks:
  fotg-network:
    driver: bridge

volumes:
  mongodata:
