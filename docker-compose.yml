version: "3.8"
services:
  fotg-api:
    build: ./api
    container_name: foodofthegods-api
    volumes:
      - ./api:/usr/src/app
    depends_on:
      fotg-db:
        condition: service_healthy
    environment:
      - START_CMD=start-dev
    ports:
      - 3000:3000
    restart: unless-stopped
    networks:
      - fotg-network

  fotg-db:
    image: mongo:3.6.23
    container_name: foodofthegods-db
    environment:
      - PUID=1000
      - PGID=1000
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
    volumes:
      - mongodata:/data/db
    # No ports exposed - only accessible within Docker network
    networks:
      - fotg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  db-seed:
    build: ./db/mongodb/seed
    networks:
      - fotg-network
    depends_on:
      fotg-db:
        condition: service_healthy

networks:
  fotg-network:
    driver: bridge

volumes:
  mongodata:

